name: OData
description: >-
  OData (Open Data Protocol) is an OASIS standard that defines best practices
  for building and consuming RESTful APIs. It enables the creation of
  query-based data services over HTTP, providing a uniform way to describe
  data and data models, query and edit data, and perform batch operations.
  OData uses standard HTTP conventions and JSON or XML payload formats.
image: https://www.odata.org/assets/OData-logo.png
url: https://www.odata.org/
tags:
- OData
- Open Data Protocol
- RESTful APIs
- Query Language
- OASIS Standard
